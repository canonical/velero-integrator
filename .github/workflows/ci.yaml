name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  schedule:
    - cron: '0 8 * * TUE'
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_charm.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}
      track:
        description: Charmhub track determined from branch name
        value: ${{ jobs.get-track.outputs.track }}

jobs:
  get-track:
    name: Get track
    runs-on: ubuntu-latest
    outputs:
      track: ${{ steps.determine-track.outputs.track }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine track
        id: determine-track
        shell: python
        run: |
          import os

          if "${{ github.event_name }}" == "pull_request":
              ref = "${{ github.base_ref }}"
          else:
              ref = "${{ github.ref_name }}"

          if ref.startswith("track/"):
              track = ref.removeprefix("track/")
          else:
              track = "latest"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"track={track}\n")

          print(f"Track: {track}")

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: pipx install tox
      - run: tox -vve lint

  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: pipx install tox
      - run: tox -e unit

  build:
    name: Build charm
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      cache: true
    permissions:
      actions: read
      contents: read

  build-test-charm:
    name: Build test charm
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      path-to-charm-directory: tests/integration/test-app
      cache: true
    permissions:
      actions: read
      contents: read

  release:
    name: Release charm to Charmhub branch
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - get-track
      - build
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_pr.yaml@v49.0.1
    with:
      track: ${{ needs.get-track.outputs.track }}
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
    secrets:
      charmhub-token: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
    permissions:
      actions: read
      contents: read

  integration:
    name: Integration tests
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pipx install tox

      - name: Setup environment
        run: |
          sudo snap install --classic concierge
          sudo concierge prepare -p k8s

      - name: Download packed charm(s)
        id: download-charms
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true

      - name: Integration tests
        run: |
          tox -vve integration
        env:
          CI: "true"
          CHARM_PATH: ${{ github.workspace }}/velero-integrator_ubuntu@24.04-amd64.charm
          TEST_APP_CHARM_PATH: ${{ github.workspace }}/tests/integration/test-app/test-app-velero-integrator_ubuntu@24.04-amd64.charm

      # On failure, capture debugging resources
      - name: Get all
        run: kubectl get all -A
        if: failure()

      - name: Describe deployments
        run: kubectl describe deployments -A
        if: failure()

      - name: Get juju status
        run: juju status
        if: always()

      - name: Get velero-integrator logs
        run: juju debug-log --replay --include velero-integrator/0
        if: failure()

      - name: Save debug artifacts
        uses: canonical/kubeflow-ci/actions/dump-charm-debug-artifacts@main
        if: failure()

  integration-e2e:
    name: E2E Integration tests
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pipx install tox

      - name: Setup environment
        run: |
          sudo snap install --classic concierge
          sudo concierge prepare -p k8s

      - name: Download packed charm(s)
        id: download-charms
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true

      - name: E2E Integration tests
        run: |
          tox -vve integration-e2e
        env:
          CI: "true"
          CHARM_PATH: ${{ github.workspace }}/velero-integrator_ubuntu@24.04-amd64.charm
          TEST_APP_CHARM_PATH: ${{ github.workspace }}/tests/integration/test-app/test-app-velero-integrator_ubuntu@24.04-amd64.charm

      # On failure, capture debugging resources
      - name: Get all
        run: kubectl get all -A
        if: failure()

      - name: Describe Velero resources
        run: |
          kubectl describe schedules.velero.io -A || true
          kubectl describe backups.velero.io -A || true
          kubectl describe backupstoragelocations.velero.io -A || true
        if: failure()

      - name: Get juju status
        run: juju status
        if: always()

      - name: Get velero-integrator logs
        run: juju debug-log --replay --include velero-integrator/0
        if: failure()

      - name: Get velero-operator logs
        run: juju debug-log --replay --include velero-operator/0
        if: failure()

      - name: Save debug artifacts
        uses: canonical/kubeflow-ci/actions/dump-charm-debug-artifacts@main
        if: failure()
